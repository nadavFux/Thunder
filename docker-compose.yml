version: '3.9'

services:
  app-db:
    image: postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-thunder}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-thunder_secret}
      POSTGRES_DB: ${POSTGRES_DB:-thunder_app}
    ports:
      - "5432:5432"
    volumes:
      - app_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-thunder} -d ${POSTGRES_DB:-thunder_app}"]
      interval: 5s
      timeout: 5s
      retries: 5

  stac-db:
    image: ghcr.io/stac-utils/pgstac:latest
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${PGSTAC_PASSWORD:-pgstac_secret}
      POSTGRES_DB: ${PGSTAC_DB:-postgis}
    ports:
      - "5433:5432"
    volumes:
      - stac_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ${PGSTAC_DB:-postgis}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  app-api:
    build:
      context: ./services/app-api
    ports:
      - "8000:8000"
    volumes:
      - ./services/app-api:/app
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-thunder}:${POSTGRES_PASSWORD:-thunder_secret}@app-db:5432/${POSTGRES_DB:-thunder_app}
    depends_on:
      app-db:
        condition: service_healthy

  stac-api:
    build:
      context: ./services/stac-api
    ports:
      - "8081:8081"
    volumes:
      - ./services/stac-api:/app
    environment:
      - PGUSER=postgres
      - PGPASSWORD=${PGSTAC_PASSWORD:-pgstac_secret}
      - PGDATABASE=${PGSTAC_DB:-postgis}
      - PGHOST=stac-db
      - PGPORT=5432
      # Some versions still use these:
      - POSTGRES_USER=postgres
      - POSTGRES_PASS=${PGSTAC_PASSWORD:-pgstac_secret}
      - POSTGRES_DBNAME=${PGSTAC_DB:-postgis}
      - POSTGRES_HOST_READER=stac-db
      - POSTGRES_HOST_WRITER=stac-db
      - POSTGRES_PORT=5432
    depends_on:
      stac-db:
        condition: service_healthy

  tiler-api:
    build:
      context: ./services/tiler-api
    ports:
      - "8082:8082"
    volumes:
      - ./services/tiler-api:/app
    environment:
      - PGUSER=postgres
      - PGPASSWORD=${PGSTAC_PASSWORD:-pgstac_secret}
      - PGDATABASE=${PGSTAC_DB:-postgis}
      - PGHOST=stac-db
      - PGPORT=5432
      # Some versions still use these:
      - POSTGRES_USER=postgres
      - POSTGRES_PASS=${PGSTAC_PASSWORD:-pgstac_secret}
      - POSTGRES_DBNAME=${PGSTAC_DB:-postgis}
      - POSTGRES_HOST_READER=stac-db
      - POSTGRES_HOST_WRITER=stac-db
      - POSTGRES_PORT=5432
    depends_on:
      stac-db:
        condition: service_healthy

  worker:
    build:
      context: ./services/worker
    volumes:
      - ./services/worker:/app
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - DATABASE_URL=postgresql://${POSTGRES_USER:-thunder}:${POSTGRES_PASSWORD:-thunder_secret}@app-db:5432/${POSTGRES_DB:-thunder_app}
      - PGUSER=postgres
      - PGPASSWORD=${PGSTAC_PASSWORD:-pgstac_secret}
      - PGDATABASE=${PGSTAC_DB:-postgis}
      - PGHOST=stac-db
      - PGPORT=5432
      # Some versions still use these:
      - POSTGRES_USER=postgres
      - POSTGRES_PASS=${PGSTAC_PASSWORD:-pgstac_secret}
      - POSTGRES_DBNAME=${PGSTAC_DB:-postgis}
      - POSTGRES_HOST_READER=stac-db
      - POSTGRES_HOST_WRITER=stac-db
      - POSTGRES_PORT=5432
    depends_on:
      redis:
        condition: service_started
      app-db:
        condition: service_healthy
      stac-db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_APP_API_URL=http://localhost:8000
    depends_on:
      - app-api
      - stac-api
      - tiler-api

volumes:
  app_db_data:
  stac_db_data:
